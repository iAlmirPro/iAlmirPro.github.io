<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSX Dev Preview</title>

  <!-- React + ReactDOM + Babel — served locally, no internet required -->
  <script src="react.development.js"></script>
  <script src="react-dom.development.js"></script>
  <script src="babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; color: #fff; font-family: sans-serif; }
    #root { min-height: 100vh; }
    #dev-error {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      background: #c8102e; color: #fff;
      font-family: monospace; font-size: 13px;
      padding: 12px 16px; z-index: 9999;
      white-space: pre-wrap; word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="dev-error"></div>
  <div id="root"></div>

  <!-- Load the pre-processed JSX (generated by dev.sh) -->
  <script type="text/babel" src="__bundle.jsx" data-type="module"></script>

  <script>
    // Surface Babel/React errors visibly in the page
    window.addEventListener('error', function(e) {
      var el = document.getElementById('dev-error');
      el.style.display = 'block';
      el.textContent = '❌ ' + (e.message || e) + (e.filename ? '\n' + e.filename + ':' + e.lineno : '');
    });
  </script>
</body>
</html>
