name: Cache Bust CSS

on:
  push:
    branches: [main]
    paths:
      - 'style.css'

jobs:
  cache-bust:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject git SHA as CSS version
        run: |
          VERSION=$(git rev-parse --short HEAD)
          sed -i "s/style\.css?v=[^\"']*/style.css?v=$VERSION/g" index.html
          echo "CSS version → $VERSION"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: cache-bust CSS → $(git rev-parse --short HEAD)"
          git push
