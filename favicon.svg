<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#000000"/>
  <!-- Red accent bar -->
  <rect y="28" width="32" height="4" fill="#dd3333"/>
  <!-- A — thin, white -->
  <text x="1" y="24"
        font-family="Arial,Helvetica,sans-serif"
        font-size="21"
        font-weight="300"
        fill="#ffffff">A</text>
  <!-- B — bold, red -->
  <text x="15" y="24"
        font-family="Arial,Helvetica,sans-serif"
        font-size="21"
        font-weight="900"
        fill="#dd3333">B</text>
</svg>
